# .github/workflows/auto-release.yml
name: Auto Release Bot

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'MAINTENANCE_GUIDE.md'
      - '.github/**'
      - 'docs/**'
  
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  auto-release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.5.0'
        cache: 'npm'
        
    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Release Bot (rezky_nightky)"
        
    - name: Install dependencies
      run: npm ci
      
    - name: Determine version bump
      id: version_bump
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "bump_type=${{ github.event.inputs.version_type }}" >> $GITHUB_OUTPUT
        else
          # Auto-determine version bump based on commit message
          if [[ "${{ github.event.head_commit.message }}" =~ ^\[major\] ]]; then
            echo "bump_type=major" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.head_commit.message }}" =~ ^\[minor\] ]]; then
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          else
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          fi
        fi
        
    - name: Bump version
      id: bump
      run: |
        OLD_VERSION=$(node -p "require('./package.json').version")
        npm version ${{ steps.version_bump.outputs.bump_type }} --no-git-tag-version
        NEW_VERSION=$(node -p "require('./package.json').version")
        echo "old_version=$OLD_VERSION" >> $GITHUB_OUTPUT
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        
    - name: Update CHANGELOG.md
      run: |
        if [ ! -f CHANGELOG.md ]; then
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
        fi
        
        # Prepare changelog entry
        DATE=$(date '+%Y-%m-%d')
        COMMIT_HASH=$(git rev-parse --short HEAD)
        
        # Create temp file with new entry
        cat > temp_changelog.md << EOF
        # Changelog
        
        ## [v${{ steps.bump.outputs.new_version }}] - $DATE
        
        **Built by:** rezky_nightky on zenpc
        **Commit:** $COMMIT_HASH
        **Architecture:** ARM64-v8a
        
        ### Changes:
        - ${{ github.event.head_commit.message }}
        
        ---
        
        EOF
        
        # Append old changelog (skip first line "# Changelog")
        tail -n +2 CHANGELOG.md >> temp_changelog.md
        mv temp_changelog.md CHANGELOG.md
        
    - name: Commit version bump
      run: |
        git add package.json package-lock.json CHANGELOG.md
        git commit -m "🚀 Release v${{ steps.bump.outputs.new_version }} [skip ci]
        
        Built by: rezky_nightky
        Platform: zenpc  
        Previous: v${{ steps.bump.outputs.old_version }}
        Architecture: ARM64-v8a"
        
    - name: Create and push tag
      run: |
        git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}
        
        🔧 Built by: rezky_nightky
        💻 Platform: zenpc
        📱 Target: ARM64-v8a
        🌿 Branch: ${{ github.ref_name }}
        
        Automated release created by Release Bot"
        git push origin main
        git push origin "v${{ steps.bump.outputs.new_version }}"
        
    - name: Generate Release Notes
      id: release_notes
      run: |
        COMMITS=$(git log v${{ steps.bump.outputs.old_version }}..HEAD --pretty=format:"- %s (%an)" --no-merges | head -10)
        
        cat > release_notes.md << EOF
        🚀 **BMI Calculator v${{ steps.bump.outputs.new_version }}**
        
        **Release Information:**
        - 👨‍💻 Built by: rezky_nightky
        - 💻 Platform: zenpc
        - 🏗️ Architecture: ARM64-v8a only
        - 📅 Release Date: $(date '+%Y-%m-%d %H:%M UTC')
        - 🌿 Branch: ${{ github.ref_name }}
        
        **What's New:**
        $COMMITS
        
        **Download:**
        Download the APK below for Android devices with ARM64 processors.
        
        **Installation:**
        1. Download BMI-Calculator-v${{ steps.bump.outputs.new_version }}-*-arm64.apk
        2. Enable "Install from unknown sources" on your Android device
        3. Install the APK
        
        ---
        *This release was automatically created by Release Bot*
        EOF
        
    - name: Wait for build workflow
      run: |
        echo "Waiting for Android build to complete..."
        sleep 30
        
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      release_notes: ${{ steps.release_notes.outputs.content }}
