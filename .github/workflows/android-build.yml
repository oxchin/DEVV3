# .github/workflows/android-build.yml
name: Android Build & Release

on:
  push:
    branches: [ main, dev4 ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.5.0'
        cache: 'npm'
        
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install dependencies
      run: npm ci
      
    - name: Build Svelte app
      run: |
        MOBILE_BUILD=true npm run build
        ls -la build/  # Verify build output
      
    - name: Sync Capacitor
      run: |
        npm install -g @capacitor/cli
        npx cap sync android
        
    - name: Setup Gradle cache
      uses: gradle/gradle-build-action@v2
      
    - name: Create keystore from secrets
      run: |
        mkdir -p android
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/keystore.p12
        
    - name: Build Android APK (ARM64)
      working-directory: android
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=keystore.p12 \
          -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
          -Pandroid.injected.signing.key.alias="rezky-cahya-sahputra-key" \
          -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"
          
    - name: Copy APK to output directory
      run: |
        mkdir -p apk_output
        cp android/app/build/outputs/apk/release/app-release.apk \
           apk_output/package-release-arm64-v8a-1.apk
           
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: BMI-Calculator-APK
        path: apk_output/package-release-arm64-v8a-1.apk
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: apk_output/package-release-arm64-v8a-1.apk
        body: |
          🚀 **BMI Calculator Release**
          
          **Changes in this version:**
          - Automated build for ARM64 architecture
          - Built by: rezky_nightky
          - Platform for coding: zenpc
          - Branch: ${{ github.ref_name }}
          
          **Technical Details:**
          - Architecture: ARM64-v8a
          - Node.js: v24.5.0
          - Build Date: ${{ github.run_id }}
          
          Download the APK below and install on your Android device.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}