apply plugin: 'com.android.application'

android {
    namespace "rezky.nightky"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "rezky.nightky"
        // Set minimum Android SDK version to 26 (Android 8.0)
        minSdkVersion 26
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // Build only for arm64-v8a to reduce APK size
        ndk {
            abiFilters "arm64-v8a"
        }
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // Set Java source and target compatibility to Java 17
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    // Add Java compiler lint options
    tasks.withType(JavaCompile) {
        options.compilerArgs += ["-Xlint:unchecked", "-Xlint:deprecation"]
    }
    signingConfigs {
        release {
            // Use environment variables for signing config (secure for CI/CD)
            storeFile file(System.getenv("RELEASE_STORE_FILE") ?: "keystore.p12")
            storePassword System.getenv("RELEASE_STORE_PASSWORD") ?: System.getenv("SPARK_KEYSTORE_PASS")
            keyAlias System.getenv("RELEASE_KEY_ALIAS") ?: System.getenv("SPARK_ALIAS")
            keyPassword System.getenv("RELEASE_KEY_PASSWORD") ?: System.getenv("SPARK_KEY_PASS")
            storeType "PKCS12"
            // Keep modern signing schemes enabled
            enableV1Signing true
            enableV2Signing true
            enableV3Signing true
            enableV4Signing true
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
            debuggable false
            // Use optimized default ProGuard config
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            jniDebuggable false
            zipAlignEnabled true
        }
    }
}

repositories {
    mavenCentral()
    google()
    maven { url "https://jitpack.io" }
    // Local Maven repo for any custom dependencies
    maven { url "$rootDir/local-maven-repo" }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

// (Removed duplicate android { compileOptions } block; compileOptions are already set above)

// Copy the generated release APK to a custom folder with a friendly name
tasks.register("copyReleaseApk", Copy) {
    dependsOn("assembleRelease")
    from("$buildDir/outputs/apk/release")
    include("*.apk")
    into("$rootDir/../apk_output")
    // Name APK as package-release-arm64-v8a-1.apk
    rename { String fileName ->
        return "package-release-dev-arm64-v8a-1.apk"
    }
}
